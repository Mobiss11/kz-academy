name: Markdown lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pymarkdown
        run: pip install pymarkdownlnt

      - name: Run pymarkdown
        run: |
          pymarkdown --config .pymarkdown.json scan \
            SKILL.md README.md \
            connectors/*.md \
            docs/*.md
